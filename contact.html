<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="Website_temp_logo_final.png">
    <style>
        nav a {
            transition: color 0.3s, transform 0.3s, text-shadow 0.3s;
            display: inline-block;
            border-radius: 15px;

        }

        nav a:hover {
            color: #c084e0;
            transform: scale(1.15) translateY(-2px);
            border-radius: 15px; 
            text-shadow: 0 0 15px rgba(192, 132, 224, 0.3);
        }
        
        ::-webkit-scrollbar{width: 8px;}
        ::-webkit-scrollbar-track {background: #fde8e0}
        ::-webkit-scrollbar-thumb {background-color: #6b2d8b;border-radius: 10px;}
        ::-webkit-scrollbar-thumb:hover { background-color: #c084e0;}

        input, textarea {
            border: 1.5px solid rgba(107, 45, 139, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Raleway', sans-serif;
            font-size: 15px;
            outline: none;
            background-color: rgba(255, 255, 255, 0.7);
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border: 1.5px solid #c084e0;
            box-shadow: 0 0 8px rgba(192, 132, 224, 0.35);
        }

        label {
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
            color: #6b2d8b;
        }

        button {
            background-color: #6b2d8b;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 32px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c084e0;
        }

        @media (max-width: 768px) {
            nav > span{font-size: 16px !important;
                flex: unset !important;
                }
            nav > img{width: 30px  !important; 
                height: 30px  !important; 
                }

            nav{padding: 12px 16px  !important;}

            nav > div:nth-child(3) {gap:4px  !important}

            nav > div:nth-child(3) a {
                font-size: 14px !important;
                margin: 0 4px !important;
                padding: 4px 4px !important;
                margin-left: 11px !important;
            }

            nav > div:last-child a {
                font-size: 14px !important;
                padding: 6px 12px !important;
                border-radius: 14px !important;
                margin-left: 11px;
            }

            footer {
                padding: 11px 15px !important;
            }

            footer > p {
                font-size: 12px !important;
            }


            main {
                padding: 16px !important;
            }

            h1 {
                font-size: 24px !important;
            }

            p {
                font-size: 14px !important;
                max-width: 100% !important;
            }

        } 

    </style>
    
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;background: linear-gradient(135deg, #fde8e0, #f9e4ee, #fceef0);">

    <nav style="display: flex; align-items: center; padding: 16px 40px;">
        <img src="Website_temp_logo_final.png" alt="Logo" style="width: 40px; height: 40px; margin-right: 10px; vertical-align: middle;">
        <span style="font-family: 'Cormorant Garamond', serif; font-size: 35px; font-weight: 600; flex: 1;">Manjot Singh</span>
        <div style="flex: 1; display: flex; justify-content: center; gap: 8px;box-shadow: 10px 10px 12px rgba(107, 45, 139, 0.25);border-radius: 100px;">
            <a href="index.html" style="font-family: 'Cormorant Garamond', serif; margin: 0 12px; font-size: 19px; padding: 4px 8px; display: inline-block; text-decoration: none; color: #6b2d8b;">Home</a>
            <a href="about.html"  style="font-family: 'Cormorant Garamond', serif; margin: 0 12px; font-size: 19px; padding: 4px 8px; display: inline-block; text-decoration: none; color: #6b2d8b;">About</a>
            <a href="project.html"  style="font-family: 'Cormorant Garamond', serif; margin: 0 12px; font-size: 19px; padding: 4px 8px; display: inline-block; text-decoration: none; color: #6b2d8b;">Projects</a>
        </div>
        <div style="flex: 1; display: flex; justify-content: flex-end;">
           <a href="contact.html"  style="font-family: 'Cormorant Garamond', serif; font-size: 19px; padding: 8px 20px; display: inline-block; text-decoration: none; color: #ffffff; background-color: #6b2d8b; border-radius: 20px;box-shadow: 10px 10px 12px rgba(107, 45, 139, 0.25);">Contact</a>
        </div>
    </nav>

    <hr style="margin: 0;">

    <main style="flex: 1; padding: 80px 40px 120px;">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 55px; margin-bottom: 8px; text-align: center;">CONTACT</h1>
        <p style="font-family: 'Raleway', sans-serif; font-size: 25px; line-height: 1.6; color: #555; text-align: center; max-width: 600px; margin: 0 auto;">Email: manjotsinghdh2007@gmail.com</p>
        <p style="font-family: 'Raleway', sans-serif; font-size: 25px; line-height: 1.6; color: #555; text-align: center; max-width: 600px; margin: 0 auto;margin-bottom: 20px;">Phone: 672-667-8764</p>
        <p style="font-family: 'Raleway', sans-serif; font-size: 18px; line-height: 1.6; color: #555; text-align: center; max-width: 600px; margin: 0 auto;">Feel free to reach out if you want to meet, work together, need help, or simply want to talk.</p>
    </main>

    <hr style="margin: 0px;">

    <form action="contact.html" method="POST" style="margin: 0 auto; max-width: 400px; text-align: center; padding: 50px 0;">

        <label for="name">Name</label><br>
        <input id="name" name="name" type="text" required><br><br>

        <label for="age">Age (must be between 18 and 130)</label><br>
        <input id="age" name="age" type="number" min="18" max="130" required><br><br>

        <label for="email">Email</label><br>
        <input id="email" name="email" type="email"><br><br>

        <label for="tel">Telephone Number</label><br>
        <input id="tel" name="telephone_number" type="tel"><br><br>

        <label for="date">When would you like me to contact you</label><br>
        <input id="date" name="date" type="date"><br><br>

        <label for="msg">Message</label><br>
        <textarea id="msg" name="message" rows="5" placeholder="type here(max 500 character)" maxlength="500"></textarea><br><br>

        <button type="submit">Send</button>

    </form>





    <hr style="margin: 0;">

    <footer style="padding: 16px 40px;">
        <p>© 2026 Manjot Singh. All rights reserved.</p>
    </footer>

</body>
</html>
